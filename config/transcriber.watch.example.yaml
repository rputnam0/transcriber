backend: faster
device: auto
model: large-v3
compute_type: float16
batch_size: 32
auto_batch: true

# Watch-specific settings
watch: true
watch_input: audio/incoming
# Successfully processed inputs are automatically moved under
# `<watch_input>/processed/` so deleting old transcript outputs does not
# silently requeue the same audio.
watch_interval: 10
watch_stability: 5
output_dir: outputs
non_session_output_dir:
  # Optional alternate root for recordings that do not resolve to a session number.
  # Useful for smoke tests, ad-hoc clips, and other odds-and-ends transcripts that
  # should not land in your main campaign transcript folder.

# Optional glob patterns to skip while recursively scanning the watch root.
# Useful when the watch root contains raw stems or other source artifacts that
# should not be treated as new transcription jobs.
watch_exclude_globs:
  - "**/[0-9]-*.wav"

# When false, watch mode skips older files that already have a transcript instead
# of backfilling LLM post-processing for them. New transcriptions still run
# post-processing immediately after transcription.
watch_postprocess_backfill: false

# Speaker mapping can still be used to rename tracks when known.
speaker_mapping: config/speaker_mapping.example.yaml

# Cache + logging settings carry over from the interactive CLI defaults.
cache_mode: repo
cache_root:
local_files_only: false
log_level: WARNING
quiet: true

# Optional LLM post-processing for completed transcripts.
postprocess:
  enabled: false
  provider: google
  model: gemini-3-flash-preview
  thinking_level: high  # Gemini 3 uses thinkingLevel; omit to use the model default (currently high)
  api_key_env: GOOGLE_API_KEY
  prompts_dir: /mnt/g/My Drive/DND/Code/Simple LLM Summary/Prompts
  summaries_dir: /mnt/g/My Drive/DND/Summaries
  raw_text_subdir: raw_txt
  calls_per_minute: 5
  skip_existing: true
