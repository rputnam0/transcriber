backend: auto  # auto -> faster for CUDA/speaker-aware runs, parakeet for ZIP stems or explicit single-speaker CPU runs
# device options: auto (default), cuda, cpu
device: auto
model: large-v3
compute_type: float16
batch_size: 32
# Let the tool adjust batch size automatically when true
auto_batch: true

# Input / watch mode
# `input` runs a single transcription. Set `watch: true` to keep scanning a directory,
# optionally overriding the folder with `watch_input`.
input: audio/Session_32.zip
watch: false
watch_input: audio/incoming
watch_interval: 10
watch_stability: 5
output_dir: outputs

# Output formats
# Disable these flags to skip generating the associated files.
write_srt: true
write_jsonl: true

# Speaker labeling / diarization
speaker_mapping: config/speaker_mapping.example.yaml
min_speakers:
max_speakers:
diarization_model: pyannote/speaker-diarization-community-1
# When input resolves to a single file, label all segments with this speaker name.
single_file_speaker:

speaker_bank:
  enabled: true
  path: default  # stored under cache_root/speaker_bank/
  threshold: 0.35
  radius_factor: 2.5
  use_existing: true
  train_from_stems: false
  scoring_margin: 0.0
  scoring:
    whiten: true
  match_per_segment: true
  min_segments_per_label: 1
  classifier:
    model: knn             # knn | logreg | logreg_unbalanced | torch_linear
    c: 1.0                 # ignored by knn
    n_neighbors: 7
    training_mode: mixed   # mixed | clean | hybrid
    clean_max_records_per_speaker_per_session: 100
    dataset_cache_dir: ./.hf_cache/speaker_bank/default/classifier_dataset
    min_confidence: 0.0
    min_margin: 0.03
    excluded_speakers: []  # Optional labels to drop from classifier and bank training
    augmentation:
      profile: none        # none | light | discord
      copies: 0
      seed: 13
    input_paths: []        # Optional extra ZIP roots for classifier training
    transcript_roots: []   # Optional transcript roots paired with input_paths
  emit_pca: true
  cluster:
    method: dbscan
    eps: 0.28
    min_samples: 5
pyannote_on_cpu: false

# Cache location strategy
# cache_mode options: home (=~/hf_cache), repo (=./.hf_cache), env (=respect HF env vars)
cache_mode: repo
# hf_cache_root controls Hugging Face model caches; defaults follow cache_mode when empty.
hf_cache_root:
# speaker_bank_root overrides where speaker embeddings are stored (defaults to hf_cache_root).
speaker_bank_root:
# cache_root overrides the directory used for Hugging Face caches; leave empty to auto-select.
cache_root:
# Set to true to prevent downloads (offline usage); requires models cached already.
local_files_only: false

# Logging
log_level: WARNING
quiet: true

# Optional LLM post-processing.
# When enabled, transcription writes as usual and then generates:
#   - raw markdown/text artifacts under summaries_dir/Session N/raw_txt/
#   - formatted DOCX files under summaries_dir/Session N/
# Watch mode retries incomplete post-processing via a completion marker.
postprocess:
  enabled: false
  provider: google
  model: gemini-2.5-flash
  api_key_env: GOOGLE_API_KEY
  prompts_dir: /mnt/g/My Drive/DND/Code/Simple LLM Summary/Prompts
  summaries_dir: /mnt/g/My Drive/DND/Summaries
  raw_text_subdir: raw_txt
  calls_per_minute: 5
  skip_existing: true
