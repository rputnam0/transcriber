backend: whisperx
# device options: auto (default), cuda, cpu
device: auto
model: large-v3
compute_type: float16
batch_size: 32
# Let the tool adjust batch size automatically when true
auto_batch: true

# Input / watch mode
# `input` runs a single transcription. Set `watch: true` to keep scanning a directory,
# optionally overriding the folder with `watch_input`.
input: audio/Session_32.zip
watch: false
watch_input: audio/incoming
watch_interval: 10
watch_stability: 5
output_dir: outputs

# Output formats
# Disable these flags to skip generating the associated files.
write_srt: true
write_jsonl: true

# Speaker labeling / diarization
speaker_mapping: config/speaker_mapping.example.yaml
min_speakers:
max_speakers:
# When input resolves to a single file, label all segments with this speaker name.
single_file_speaker:
vad_on_cpu: false
pyannote_on_cpu: false

# Cache location strategy
# cache_mode options: home (=~/hf_cache), repo (=./.hf_cache), env (=respect HF env vars)
cache_mode: repo
# cache_root overrides the directory used for Hugging Face caches; leave empty to auto-select.
cache_root:
# Set to true to prevent downloads (offline usage); requires models cached already.
local_files_only: false

# Logging
log_level: WARNING
quiet: true
